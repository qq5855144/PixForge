name: Build Android WebView APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Set up JDK 11
      uses: actions/setup-java@v2
      with:
        java-version: '11'
        distribution: 'adopt'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v2

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y wget unzip
        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip commandlinetools-linux-9477386_latest.zip -d /usr/local/android-sdk
        export ANDROID_SDK_ROOT=/usr/local/android-sdk
        export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/bin
        yes | sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0"

    - name: Create Android project
      run: |
        mkdir -p android/app/src/main/assets
        cp index.html android/app/src/main/assets/
        cp -r assets/* android/app/src/main/assets/

    - name: Build APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v2
      with:
        name: app-debug.apk
        path: android/app/build/outputs/apk/debug/app-debug.apk