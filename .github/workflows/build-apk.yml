name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-level: '34'
          build-tools: '34.0.0'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2.2'

      - name: Generate placeholder icons (if missing)
        run: |
          # 为 Android 生成启动图标
          mkdir -p android/app/src/main/res/drawable
          if [ ! -f android/app/src/main/res/drawable/ic_launcher.png ]; then
            convert -size 48x48 xc:#4f46e5 android/app/src/main/res/drawable/ic_launcher.png
          fi
          # 为 PWA 生成清单图标
          if [ ! -f assets/icon-192.png ]; then
            convert -size 192x192 xc:#4f46e5 assets/icon-192.png
          fi
          if [ ! -f assets/icon-512.png ]; then
            convert -size 512x512 xc:#4f46e5 assets/icon-512.png
          fi

      - name: Copy web assets to Android assets
        run: |
          mkdir -p android/app/src/main/assets
          cp -r index.html manifest.json assets/ android/app/src/main/assets/

      - name: Generate Gradle Wrapper
        run: gradle wrapper --distribution-type all
        working-directory: android

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
