name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-level: '34'
          build-tools: '34.0.0'

      - name: Install Gradle 8.2.1
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2.1-bin.zip
          unzip -q gradle-8.2.1-bin.zip -d /opt
          echo "/opt/gradle-8.2.1/bin" >> $GITHUB_PATH

      - name: Generate placeholder icons (PWA & Android)
        run: |
          mkdir -p android/app/src/main/res/drawable
          mkdir -p assets
          cat > gen_icons.py << 'EOF'
          import struct, zlib
          
          def create_png(w, h, color):
              def chunk(ctype, data):
                  c = ctype + data
                  return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
              raw = b''
              for y in range(h):
                  raw += b'\x00' + bytes(color) * w
              return b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)) + chunk(b'IDAT', zlib.compress(raw)) + chunk(b'IEND', b'')
          
          open('android/app/src/main/res/drawable/ic_launcher.png', 'wb').write(create_png(192, 192, (79, 70, 229)))
          open('assets/icon-192.png', 'wb').write(create_png(192, 192, (79, 70, 229)))
          open('assets/icon-512.png', 'wb').write(create_png(512, 512, (79, 70, 229)))
          EOF
          python3 gen_icons.py

      - name: Copy web assets to Android assets
        run: |
          mkdir -p android/app/src/main/assets
          cp -r index.html manifest.json assets/ android/app/src/main/assets/

      - name: Generate Gradle Wrapper
        run: gradle wrapper --distribution-type all
        working-directory: android

      - name: Generate debug keystore
        run: keytool -genkey -v -keystore android/app/debug.keystore -alias AndroidDebugKey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Debug, OU=Dev, O=PixForge, L=Unknown, S=Unknown, C=US"

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug
        working-directory: android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
