name: Build Android WebView APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-34 build-tools;34.0.0'

    - name: Generate Gradle wrapper
      run: |
        sudo apt-get update
        sudo apt-get install -y gradle
        cd android
        gradle wrapper --gradle-version 8.4
        rm -rf ~/.gradle

    - name: Copy web assets
      run: |
        mkdir -p android/app/src/main/assets
        cp index.html android/app/src/main/assets/
        cp -r assets android/app/src/main/assets/
        cp manifest.json android/app/src/main/assets/

    - name: Generate launcher icon
      run: |
        python3 -c "
        from PIL import Image
        img = Image.new('RGBA', (96,96), color='#4f46e5')
        from PIL import ImageDraw
        draw = ImageDraw.Draw(img)
        draw.text((20,20), 'Pix', fill='white')
        import os
        os.makedirs('android/app/src/main/res/drawable', exist_ok=True)
        img.save('android/app/src/main/res/drawable/ic_launcher.png')
        "

    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
